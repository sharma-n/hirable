services:
  agent:
    build:
      context: ./agent
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./docs:/app/docs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports — internal network only (SPEC §5 boundary #3)

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./docs:/app/docs:ro
      - backend_data:/app/data
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  backend_data:
